name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            goarm: ''
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            suffix: linux-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build -ldflags="-s -w" -o server ./cmd/server

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/rspi-cam-interface-${{ matrix.suffix }}.tar.gz \
            server \
            install.sh \
            restart.sh \
            stop.sh \
            logs.sh \
            config.yaml \
            camera.yaml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rspi-cam-interface-${{ matrix.suffix }}
          path: dist/rspi-cam-interface-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          body: |
            ## Quick Install (Raspberry Pi 64-bit)

            Run this one-liner on your Raspberry Pi:

            ```bash
            cd /tmp && curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rspi-cam-interface-linux-arm64.tar.gz | tar -xz && sudo ./install.sh
            ```

            ## Quick Install (Raspberry Pi 32-bit / older)

            ```bash
            cd /tmp && curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rspi-cam-interface-linux-arm.tar.gz | tar -xz && sudo ./install.sh
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
