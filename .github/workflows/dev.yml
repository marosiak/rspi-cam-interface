name: Dev Build

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            goarm: ""
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            suffix: linux-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build -ldflags="-s -w" -o server ./cmd/server
          go build -ldflags="-s -w" -o client ./cmd/client

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/rspi-cam-interface-${{ matrix.suffix }}.tar.gz \
            server \
            client \
            install.sh \
            restart.sh \
            stop.sh \
            logs.sh \
            config.yaml \
            camera.yaml

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rspi-cam-interface-${{ matrix.suffix }}
          path: dist/rspi-cam-interface-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Delete existing dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --yes --cleanup-tag || true
        continue-on-error: true

      - name: Create dev pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dev
          name: "Dev Build"
          files: dist/*.tar.gz
          prerelease: true
          make_latest: false
          body: |
            Automated dev build from `${{ github.sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
